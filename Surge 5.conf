[General]
udp-policy-not-supported-behaviour = REJECT

dns-server = 223.5.5.5, 119.29.29.29
encrypted-dns-server = https://dns.alidns.com/dns-query,https://doh.pub/dns-query
use-local-host-item-for-proxy = false

wifi-assist = false
all-hybrid = true
udp-priority = true

internet-test-url = http://g.alicdn.com/
proxy-test-url = http://www.gstatic.com/generate_204
test-timeout = 3

disable-geoip-db-auto-update = false

ipv6 = true
ipv6-vif = auto

allow-wifi-access = false
allow-hotspot-access = false

loglevel = notify

show-error-page-for-reject = true

auto-suspend = true

exclude-simple-hostnames = true

http-api-tls = false

http-api-web-dashboard = false

[Proxy]
直接连接 = direct
拒绝连接 = reject

[Proxy Group]
Surge = select, update-interval=0, no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/02ProxySoftLogo/Surge(11).png, policy-path=https://sub.store/download/collection/one

漏网之鱼 = select, 全球服务, 直接连接, no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Catnet.png

规则修正 = select, 直接连接, 全球服务, no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Bypass.png

苹果服务 = select, 直接连接, 全球服务, no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Apple_2.png

电报服务 = select, 全球服务, 直接连接, no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Telegram.png

媒体服务 = select, 全球服务, 直接连接, 香港节点, 台湾节点, 日本节点, 韩国节点, 新国节点, 美国节点, no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/DisneyPlus.png

微软服务 = select, 全球服务, 直接连接, no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Microsoft.png

全球服务 = select, 香港节点, 台湾节点, 日本节点, 韩国节点, 新国节点, 美国节点, no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/Global.png

香港节点 = smart, no-alert=0, hidden=0, include-all-proxies=0, include-other-group=Surge, icon-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/HK.png, policy-regex-filter=🇭🇰|香港

台湾节点 = smart, no-alert=0, hidden=0, include-all-proxies=0, include-other-group=Surge, icon-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/TW.png, policy-regex-filter=🇹🇼|台湾

日本节点 = smart, no-alert=0, hidden=0, include-all-proxies=0, include-other-group=Surge, icon-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/JP.png, policy-regex-filter=🇯🇵|日本

韩国节点 = smart, no-alert=0, hidden=0, include-all-proxies=0, include-other-group=Surge, icon-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/KR.png, policy-regex-filter=🇰🇷|韩国

新国节点 = smart, no-alert=0, hidden=0, include-all-proxies=0, include-other-group=Surge, icon-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/SG.png, policy-regex-filter=🇸🇬|新加坡

美国节点 = smart, no-alert=0, hidden=0, include-all-proxies=0, include-other-group=Surge, icon-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/US.png, policy-regex-filter=🇺🇸|美国

[Rule]
RULE-SET,Direct.list,规则修正
RULE-SET,Emby.list,媒体服务
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Surge/Apple/Apple_All.list,苹果服务
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Surge/Telegram/Telegram.list,电报服务
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Surge/Microsoft/Microsoft.list,微软服务
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Surge/Global/Global_All.list,全球服务,extended-matching
