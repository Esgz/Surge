# 配置名称 Clash 配置
# 适用范围 Mihomo 内核

# 基本配置
port: 7890
socks-port: 7891
mixed-port: 7892
redir-port: 7893
tproxy-port: 7894

unified-delay: true
geodata-mode: false
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 24
tcp-concurrent: true
find-process-mode: strict
global-client-fingerprint: chrome

allow-lan: true
mode: rule
log-level: info
ipv6: true
udp: true

external-controller: 0.0.0.0:9090
# external-ui: ui
# external-ui-url: 'https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip'

geox-url:
  # geoip: 'https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/geoip.dat'
  # geosite: 'https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/geosite.dat'
  mmdb: 'https://geodata.kelee.one/Country-Masaiki.mmdb'
  asn: 'https://geodata.kelee.one/GeoLite2-ASN-P3TERX.mmdb'

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - +.v2ex.com

  skip-domain:
    - Mijia Cloud

tun:
  enable: true
  stack: system
  dns-hijack:
    - any:53
  auto-route: true
  auto-detect-interface: true

# P2P下载端口
listeners:
- name: socks5-in-1
  type: socks
  port: 10808
  listen: 0.0.0.0
  udp: true
  users: []
  proxy: DIRECT

dns:
  enable: true
  prefer-h3: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter:
    - "*"
    - +.lan
  default-nameserver:
    - 223.5.5.5
    - 223.6.6.6
  nameserver:
    - https://223.5.5.5/dns-query
    - https://223.6.6.6/dns-query

# 锚点 节点订阅
# 每24小时更新一次，每10分钟一次健康检查
NodeParam:
  &NodeParam
    type: http
    interval: 3600
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 60

# 节点订阅
proxy-providers:
  Clash:
    <<: *NodeParam
    path: './proxy_providers/meizu.yaml'
    url: 'https://api.dyljstar.sbs/api/v1/client/subscribe?token=973eb8db89c0718e7374f49977cd51f3'

# 锚点 时延优选
UrlTest:
  &UrlTest
    type: url-test
    interval: 6
    tolerance: 20
    lazy: true
    url: http://www.gstatic.com/generate_204
    disable-udp: false
    timeout: 2000
    max-failed-times: 3
    hidden: false
    include-all-providers: true

# 锚点 规则类型，每24小时更新一次
# 经典匹配
classical:
  &classical
    type: http
    behavior: classical
    interval: 86400
    format: yaml

# 文本匹配
text:
  &text
    type: http
    behavior: classical
    interval: 86400
    format: text

# 本地策略
proxies:
  - name: 直接连接
    type: direct
    udp: true

  - name: 拒绝连接
    type: reject

# 代理策略
proxy-groups:
  - name: 规则修正
    type: select
    icon: https://raw.githubusercontent.com/Esgz/icon/refs/heads/main/Clash.png
    proxies:
      - 直接连接
      - 全球服务

  - name: 漏网之鱼
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Catnet.png
    proxies:
      - 全球服务
      - 直接连接

  - name: 电报服务
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Telegram.png
    proxies:
      - 全球服务
      - 香港节点
      - 台湾节点
      - 日本节点
      - 新国节点
      - 美国节点

  - name: 谷歌服务
    type: select
    icon: https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/Google_02.png
    proxies:
      - 美国节点

  - name: 全球服务
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Global.png
    proxies:
      - 香港节点
      - 台湾节点
      - 日本节点
      - 新国节点
      - 美国节点
      - 直接连接

# 节点策略
  - name: 香港节点
    icon: https://raw.githubusercontent.com/Centralmatrix3/Matrix-io/master/Gallery/Color/HK.png
    <<: *UrlTest
    filter: ^(?=.*(🇭🇰|香港))(?!.*(直连|5x))

  - name: 台湾节点
    icon: https://raw.githubusercontent.com/Centralmatrix3/Matrix-io/master/Gallery/Color/TW.png
    <<: *UrlTest
    filter: 台湾|台|TW|🇹🇼

  - name: 日本节点
    icon: https://raw.githubusercontent.com/Centralmatrix3/Matrix-io/master/Gallery/Color/JP.png
    <<: *UrlTest
    filter: 日本|JP|🇯🇵

  - name: 新国节点
    icon: https://raw.githubusercontent.com/Centralmatrix3/Matrix-io/master/Gallery/Color/SG.png
    <<: *UrlTest
    filter: 新加坡|狮|SG|🇸🇬

  - name: 美国节点
    icon: https://raw.githubusercontent.com/Centralmatrix3/Matrix-io/master/Gallery/Color/US.png
    <<: *UrlTest
    filter: 美国|美|US|🇺🇸

# 订阅规则
rule-providers:
  规则修正:
    <<: *text
    path: './rules/Direct.text'
    url: 'https://raw.githubusercontent.com/Esgz/Surge/refs/heads/main/Direct.text'

  电报服务:
    <<: *classical
    path: './rules/Telegram.yaml'
    url: 'https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Telegram/Telegram.yaml'

  谷歌服务:
    <<: *classical
    path: './rules/Google.yaml'
    url: 'https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Google/Google.yaml'

  全球服务:
    <<: *classical
    path: './rules/Global.yaml'
    url: 'https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Global/Global_Classical.yaml'

  大陆服务:
    <<: *classical
    path: './rules/ChinaMax.yaml'
    url: 'https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/ChinaMax/ChinaMax_Classical.yaml'

# 规则指向
rules:
  - RULE-SET,规则修正,规则修正
  - RULE-SET,电报服务,电报服务
  - RULE-SET,谷歌服务,谷歌服务
  - RULE-SET,全球服务,全球服务
  - RULE-SET,大陆服务,直接连接
  - MATCH,漏网之鱼

