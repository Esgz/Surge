#「Clash_Mihomo」配置
# 日期：2026-01-08
# 版本：1.7
# 配置作者：https://github.com/Esgz
# 适用版本：所有使用 Mihomo 内核的程序

# 端口配置
port: 7890
socks-port: 7891
mixed-port: 7892
redir-port: 9797
tproxy-port: 9898

# 通用配置
unified-delay: true
geodata-mode: false
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 24
tcp-concurrent: true
find-process-mode: strict
global-client-fingerprint: chrome

allow-lan: true
mode: rule
log-level: info
ipv6: true
udp: true

# 面板配置
external-controller: 0.0.0.0:9090
external-ui: ui
external-ui-url: 'https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip'
#external-ui-url: 'https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip'

geox-url:
  # geoip: 'https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/geoip.dat'
  # geosite: 'https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/geosite.dat'
  mmdb: 'https://geodata.kelee.one/Country-Masaiki.mmdb'
  asn: 'https://geodata.kelee.one/GeoLite2-ASN-P3TERX.mmdb'

# 缓存配置
profile:
  store-selected: true
  store-fake-ip: true

# 嗅探配置
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - +.v2ex.com

  skip-domain:
    - Mijia Cloud

# TUN 配置
tun:
  enable: true
  stack: gvisor # gvisor/mixed/system
  dns-hijack:
    - any:53
  auto-route: true
  auto-detect-interface: true

# P2P下载端口
listeners:
- name: socks5-in-1
  type: socks
  port: 10808
  listen: 0.0.0.0
  udp: true
  users: []
  proxy: DIRECT

# DNS配置
dns:
  enable: true
  prefer-h3: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter:
    - "*"
    - +.lan
  default-nameserver:
    - 223.5.5.5
    - 223.6.6.6
  nameserver:
    - https://223.5.5.5/dns-query
    - https://223.6.6.6/dns-query

# 策略组
# 锚点 - 节点订阅的参数 [每1小时更新一次订阅节点，每 60 秒一次健康检查]
NodeParam: &NodeParam
  type: http
  interval: 3600
  health-check:
    enable: true
    url: 'http://connectivitycheck.gstatic.com/generate_204'
    interval: 60

# 锚点 - 时延优选参数 [每 6 秒一次惰性健康检查，容差 20ms，时延超过 2 秒判定为失败，失败 3 次则自动触发健康检查]
one: &one
  type: url-test
  interval: 6
  tolerance: 20
  lazy: true
  url: 'http://www.gstatic.com/generate_204'
  disable-udp: false
  timeout: 2000
  max-failed-times: 3
  hidden: false
  use:
    - One

two: &two
  type: url-test
  interval: 6
  tolerance: 20
  lazy: true
  url: 'http://www.gstatic.com/generate_204'
  disable-udp: false
  timeout: 2000
  max-failed-times: 3
  hidden: false
  use:
    - Two

# 锚点 - 故障转移参数 [每 6 秒一次惰性健康检查，时延超过 2 秒判定为失败，失败 3 次则自动触发健康检查]
FallBack: &FallBack
  type: fallback
  interval: 6
  lazy: true
  url: 'http://www.gstatic.com/generate_204'
  disable-udp: false
  timeout: 2000
  max-failed-times: 3
  hidden: false
  include-all-providers: true

# 锚点 - 负载均衡参数 [每 6 秒一次惰性健康检查，时延超过 2 秒判定为失败，失败 3 次则自动触发健康检查]
LoadBalance: &LoadBalance
  type: load-balance
  interval: 6
  lazy: true
  url: 'http://www.gstatic.com/generate_204'
  disable-udp: false
  strategy: consistent-hashing
  timeout: 2000
  max-failed-times: 3
  hidden: true
  include-all-providers: true

# 锚点 规则类型
# 经典匹配
classical: &classical
  type: http
  behavior: classical
  interval: 86400
  format: yaml
  proxy: 全球服务

# 文本匹配
text: &text
  type: http
  behavior: classical
  interval: 86400
  format: text
  proxy: 全球服务

# 节点订阅
proxy-providers: 
  One:
    url: '订阅一'
    <<: *NodeParam
    path: './proxy_provider/one.yaml'

  Two:
    url: '订阅二'
    <<: *NodeParam
    path: './proxy_provider/two.yaml'

# 本地策略
proxies:
  - name: 直接连接
    type: direct
    udp: true

  - name: 拒绝连接
    type: reject

# 策略组
proxy-groups:
  - name: Clash
    type: select
    icon: 'https://raw.githubusercontent.com/Esgz/icon/refs/heads/main/Clash.png'
    include-all-providers: true

  - name: 漏网之鱼
    type: select
    icon: 'https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Catnet.png'
    proxies:
      - 全球服务
      - 直接连接

  - name: 规则修正
    type: select
    icon: 'https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Bypass.png'
    proxies:
      - 直接连接
      - 全球服务

  - name: 电报服务
    type: select
    icon: 'https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Telegram.png'
    proxies:
      - 全球服务
      - 直接连接
      - 香港-壹
      - 香港-贰
      - 台湾-壹
      - 台湾-贰
      - 日本-壹
      - 日本-贰
      - 新国-壹
      - 新国-贰
      - 美国-壹
      - 美国-贰

  - name: 谷歌服务
    type: select
    icon: 'https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/Google_02.png'
    proxies:
      - 美国-壹
      - 美国-贰

  - name: 全球服务
    type: select
    icon: 'https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Global.png'
    proxies:
      - 香港-壹
      - 香港-贰
      - 台湾-壹
      - 台湾-贰
      - 日本-壹
      - 日本-贰
      - 新国-壹
      - 新国-贰
      - 美国-壹
      - 美国-贰

  - name: 香港-壹
    <<: *one
    filter: '^(?=.*(🇭🇰|香港))(?!.*(直连|5x))'
    icon: 'https://raw.githubusercontent.com/Centralmatrix3/Matrix-io/master/Gallery/Color/HK.png'

  - name: 香港-贰
    <<: *two
    filter: '^(?=.*(🇭🇰|香港))(?!.*(直连|5x))'
    icon: 'https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/01Country/Hongkong.png'

  - name: 台湾-壹
    <<: *one
    filter: '台湾|台|TW|🇹🇼'
    icon: 'https://raw.githubusercontent.com/Centralmatrix3/Matrix-io/master/Gallery/Color/TW.png'

  - name: 台湾-贰
    <<: *two
    filter: '台湾|台|TW|🇹🇼'
    icon: 'https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/01Country/taiwan(3).png'

  - name: 日本-壹
    <<: *one
    filter: '日本|JP|🇯🇵'
    icon: 'https://raw.githubusercontent.com/Centralmatrix3/Matrix-io/master/Gallery/Color/JP.png'

  - name: 日本-贰
    <<: *two
    filter: '日本|JP|🇯🇵'
    icon: 'https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/01Country/Japan(3).png'

  - name: 新国-壹
    <<: *one
    filter: '新加坡|狮|SG|🇸🇬'
    icon: 'https://raw.githubusercontent.com/Centralmatrix3/Matrix-io/master/Gallery/Color/SG.png'

  - name: 新国-贰
    <<: *two
    filter: '新加坡|狮|SG|🇸🇬'
    icon: 'https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/01Country/singapore(1).png'
  
  - name: 美国-壹
    <<: *one
    filter: '美国|美|US|🇺🇸'
    icon: 'https://raw.githubusercontent.com/Centralmatrix3/Matrix-io/master/Gallery/Color/US.png'

  - name: 美国-贰
    <<: *two
    filter: '美国|美|US|🇺🇸'
    icon: 'https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/01Country/US.png'

# 订阅规则
rule-providers:
  规则修正:
    <<: *text
    url: 'https://raw.githubusercontent.com/Esgz/Surge/refs/heads/main/Direct.text'
    path: './RuleSet/Direct.text'

  电报服务:
    <<: *classical
    url: 'https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Telegram/Telegram.yaml'
    path: './RuleSet/Telegram.yaml'
    
  谷歌服务:
    <<: *classical
    url: 'https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Google/Google.yaml'
    path: './RuleSet/Google.yaml'

  媒体服务:
    <<: *classical
    url: 'https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/GlobalMedia/GlobalMedia_Classical.yaml'
    path: './RuleSet/GlobalMedia.yaml'

  全球服务:
    <<: *classical
    url: 'https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Global/Global_Classical.yaml'
    path: './RuleSet/Global.yaml'

  大陆服务:
    <<: *classical
    url: 'https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/ChinaMax/ChinaMax_Classical.yaml'
    path: './RuleSet/ChinaMax.yaml'

# 分流规则指向
rules:
  - RULE-SET,规则修正,规则修正
  - RULE-SET,电报服务,电报服务
  - RULE-SET,谷歌服务,谷歌服务
  - RULE-SET,媒体服务,谷歌服务
  - RULE-SET,全球服务,全球服务
  - RULE-SET,大陆服务,直接连接
  - MATCH,漏网之鱼
